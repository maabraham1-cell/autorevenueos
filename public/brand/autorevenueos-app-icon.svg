<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="app-icon-title">
  <title id="app-icon-title">AutoRevenueOS app icon</title>
  <defs>
    <!-- Vibrant gradient: deep to bright blue so it pops on any background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1a3d" />
      <stop offset="40%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <!-- Strong top-left highlight for a premium, glossy feel -->
    <radialGradient id="shine" cx="28%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.5" />
      <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0" />
    </radialGradient>
    <!-- Punchy shadow -->
    <filter id="shadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.5" />
    </filter>
    <!-- Thin outline so type never gets lost -->
    <filter id="outline" x="-20%" y="-20%" width="140%" height="140%">
      <feMorphology in="SourceAlpha" operator="dilate" radius="2.5" result="dilated" />
      <feFlood flood-color="#0c1a3d" flood-opacity="0.8" result="flood" />
      <feComposite in="flood" in2="dilated" operator="in" result="stroke" />
      <feMerge>
        <feMergeNode in="stroke" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base: rounded square with gradient -->
  <rect width="256" height="256" rx="52" fill="url(#bg)" />

  <!-- Glossy highlight overlay -->
  <rect width="256" height="256" rx="52" fill="url(#shine)" />

  <!-- Thin bright border so icon stands out on light/dark backgrounds -->
  <rect x="4" y="4" width="248" height="248" rx="48" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2" />

  <!-- OS mark from logo, in white, centered (slight left for more right padding) -->
  <g transform="translate(122,128) scale(1.2) translate(-120,-120)" fill="#FFFFFF" stroke="#FFFFFF">
    <circle cx="120" cy="120" r="36" fill="none" stroke-width="3" stroke-linecap="round" stroke-dasharray="200 28" />
    <circle cx="120" cy="120" r="65" fill="none" stroke-width="2.6" opacity="0.95" />
    <text x="164" y="156" font-family="Inter, Satoshi, 'Segoe UI', Arial, sans-serif" font-size="112" font-weight="700" letter-spacing="-1.4">
      S
    </text>
  </g>
</svg>
